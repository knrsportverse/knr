<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNR SPORTVERSE | LIVE STREAM</title>
    <style>
        /* ── Reset and Base Styles ── */
        *, *::before, *::after { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        html, body { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
        }

        /* ── Modern Gradient Background for Empty State ── */
        body {
            background: linear-gradient(135deg, #1d4ed8 0%, #2563eb 50%, #60a5fa 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── Fullscreen Iframe ── */
        #viewer {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: none; /* Hidden until URL is parsed */
            background: #000;
            z-index: 9999;
        }

        /* ── Redesigned Empty State (Glassmorphism Card) ── */
        #empty-state {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            color: #ffffff;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            max-width: 90%;
            width: 420px;
            z-index: 1;
            transition: opacity 0.3s ease;
        }

        #empty-state h1 { 
            font-size: 26px; 
            margin-bottom: 12px; 
            font-weight: 700; 
            letter-spacing: 0.5px;
        }

        #empty-state p { 
            font-size: 15px; 
            opacity: 0.85; 
            margin-bottom: 24px; 
            line-height: 1.6; 
        }

        #empty-state code {
            background: rgba(0, 0, 0, 0.2);
            padding: 4px 8px;
            border-radius: 6px;
            font-family: monospace;
        }

        /* ── Interactive URL Input ── */
        .input-wrapper {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            outline: none;
            background: rgba(255, 255, 255, 0.9);
            color: #111;
            font-size: 14px;
            transition: box-shadow 0.2s ease;
        }

        .input-wrapper input:focus {
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.4);
        }

        .input-wrapper button {
            padding: 14px;
            border-radius: 8px;
            border: none;
            background: #ffffff;
            color: #db2777;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .input-wrapper button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        .input-wrapper button:active {
            transform: translateY(0);
        }

        /* ── Error Text ── */
        #error-msg {
            color: #ffb3b3;
            font-size: 13px;
            margin-top: 12px;
            display: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <iframe id="viewer" allow="autoplay; fullscreen; encrypted-media; picture-in-picture" allowfullscreen></iframe>

    <div id="empty-state">
        <h1>Content Viewer</h1>
        <p>No content loaded. You can attach your link directly in the URL using <code>?q=YOUR_LINK</code> or paste it below.</p>
        
        <div class="input-wrapper">
            <input type="url" id="url-input" placeholder="https://example.com/stream" required>
            <button onclick="launchStream()">Launch Stream</button>
        </div>
        
        <p id="error-msg">Please enter a valid URL.</p>
    </div>

    <script>
        // Core Logic
        function loadIframeFromParam() {
            const params = new URLSearchParams(window.location.search);
            const q = params.get('q');
            
            if (q) {
                renderIframe(q);
            }
        }

        function launchStream() {
            const inputVal = document.getElementById('url-input').value;
            if (inputVal) {
                // Reload page with the new URL parameter
                window.location.search = '?q=' + encodeURIComponent(inputVal);
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        }

        function renderIframe(urlStr) {
            const iframe = document.getElementById('viewer');
            const emptyState = document.getElementById('empty-state');
            const errorMsg = document.getElementById('error-msg');

            let url = urlStr.trim();
            
            // Auto-append https:// if missing
            if (!/^https?:\/\//i.test(url)) {
                url = 'https://' + url;
            }

            try {
                new URL(url); // Throws an error if the URL is completely invalid
                iframe.src = url;
                iframe.style.display = 'block';
                emptyState.style.display = 'none';
            } catch (e) {
                emptyState.style.display = 'block';
                errorMsg.textContent = 'Invalid URL detected in the parameters.';
                errorMsg.style.display = 'block';
            }
        }

        // Run checking function as soon as the DOM is ready
        window.addEventListener('DOMContentLoaded', loadIframeFromParam);
    </script>

</body>
</html>
