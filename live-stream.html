<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNR SPORTVERSE | LIVE STREAM</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #000;
            overflow: hidden;
        }
        
        video::-webkit-media-controls { display: none !important; }
        iframe { border: none; width: 100%; height: 100%; object-fit: contain; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.3); }

        /* --- CUSTOM CSS STYLES --- */
        
        /* 1. Perfect Centering Wrapper */
        .player-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* 2. Custom Player Box (Border removed, margins removed for perfect centering) */
        .custom-player-box {
            width: 100%;
            max-width: 1024px;
            aspect-ratio: 16 / 9;
            background-color: #000;
            overflow: hidden;
            position: relative;
            border: none; /* Removed border */
            /* Removed the margin that was causing it to push to one side */
        }

        /* 3. Glass Panel Utilities */
        .glass-panel { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }

        /* 4. Settings Menu Styling (Made smaller and placed lower) */
        .glass-menu {
            position: absolute;
            bottom: 55px; /* Lowered closer to the bottom bar */
            right: 16px;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px; /* Smaller radius */
            padding: 8px 12px; /* Reduced padding */
            color: #f1f5f9;
            font-size: 11px; /* Smaller font size */
            z-index: 50;
            display: none;
            box-shadow: 0 4px 10px -2px rgba(0, 0, 0, 0.5);
            transition: opacity 0.2s ease;
        }

        .glass-menu.show {
            display: block;
        }

        .official-link {
            color: #3b82f6;
            font-weight: 700;
            text-decoration: none;
            transition: color 0.2s;
        }

        .official-link:hover {
            color: #60a5fa;
            text-decoration: underline;
        }
    </style>
</head>
<body class="player-wrapper">

    <div id="loadingState" class="hidden flex flex-col items-center gap-4 text-center">
        <div class="w-12 h-12 border-4 border-blue-600/30 border-t-blue-600 rounded-full animate-spin"></div>
        <div class="text-white text-sm font-semibold">Loading stream...</div>
    </div>

    <div id="landingPage" class="hidden w-full h-full flex flex-col items-center justify-center bg-gradient-to-b from-slate-950 via-black to-slate-950 px-4">
        <div class="max-w-xl w-full flex flex-col items-center text-center gap-6">
            <div class="space-y-2">
                <h1 class="text-4xl font-bold text-white tracking-tight">KNR Sportverse</h1>
                <p class="text-slate-400 text-sm">Paste a stream link to generate a shareable viewer page</p>
            </div>

            <div class="w-full glass-panel p-6 rounded-2xl border border-slate-800/80 space-y-4 text-left shadow-2xl">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Stream Link (.m3u8 or Iframe Link)</label>
                    <input type="url" id="customUrlInput" placeholder="https://example.com/stream.m3u8" class="w-full h-12 bg-slate-900 border border-slate-800 rounded-xl px-4 text-sm text-white focus:outline-none focus:border-blue-500 transition-all">
                </div>
                <button onclick="generateAndPlay()" class="w-full h-12 bg-blue-600 hover:bg-blue-500 text-white font-semibold text-sm rounded-xl transition-all shadow-lg shadow-blue-500/10 flex items-center justify-center gap-2">
                    Generate & Play
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" /></svg>
                </button>
            </div>
        </div>
    </div>

    <div id="errorState" class="hidden flex-col items-center text-center gap-6 p-8 glass-panel rounded-3xl max-w-md mx-4">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-16 h-16 text-rose-500">
            <path stroke-linecap="round" stroke-linejoin="round" d="m9.75 9.75 4.5 4.5m0-4.5-4.5 4.5M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
        </svg>
        <div>
            <h2 class="text-xl font-bold text-white mb-2">Stream Error</h2>
            <p id="errorText" class="text-slate-400 text-sm mb-4">Could not load the provided stream URL.</p>
        </div>
        <button onclick="resetToGenerator()" class="bg-blue-600 hover:bg-blue-500 text-white font-semibold text-sm px-6 py-2 rounded-lg transition-all">
            Enter Another Link
        </button>
    </div>

    <div id="iframeContainer" class="hidden custom-player-box">
    </div>

    <div id="hlsContainer" class="hidden custom-player-box group">
        
        <video id="videoElement" crossorigin playsinline class="w-full h-full object-contain"></video>

        <div id="settingsMenu" class="glass-menu">
            <div>Official Site: <a href="https://knrsportverse.blogspot.com" target="_blank" class="official-link">KNR SPORTVERSE</a></div>
        </div>

        <div id="centerPlayContainer" class="absolute inset-0 flex items-center justify-center bg-black/20 group-hover:bg-black/30 transition-all duration-300 cursor-pointer" onclick="togglePlay(event)">
            <button id="centerPlayBtn" class="w-16 h-16 bg-white/10 hover:bg-white/20 text-white backdrop-blur-md rounded-full flex items-center justify-center border border-white/20 shadow-2xl transform transition-all duration-200 hover:scale-110 active:scale-95">
                <svg id="centerPlayIcon" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24" class="w-6 h-6 ml-1"><path d="M8 5v14l11-7z"/></svg>
                <svg id="centerPauseIcon" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24" class="w-6 h-6 hidden"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
        </div>

        <div id="liveNotification" class="absolute bottom-16 left-1/2 -translate-x-1/2 glass-panel bg-slate-950/90 text-slate-200 px-4 py-2 rounded-xl text-[11px] font-medium flex items-center gap-2 transition-all duration-300 opacity-0 translate-y-2 pointer-events-none z-30">
            <span class="w-1.5 h-1.5 bg-rose-500 rounded-full animate-pulse"></span>
            <span>Stream paused. Click <span class="text-rose-400 font-bold">LIVE</span> to play real-time.</span>
        </div>

        <div class="absolute bottom-0 inset-x-0 bg-gradient-to-t from-black/90 via-black/40 to-transparent p-4 flex items-center justify-between opacity-0 group-hover:opacity-100 transition-opacity duration-300 z-20">
            
            <div class="flex items-center gap-4 relative">
                <button onclick="togglePlay()" class="text-slate-300 hover:text-white transition-colors cursor-pointer">
                    <svg id="bottomPlayIcon" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24" class="w-5 h-5"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="bottomPauseIcon" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24" class="w-5 h-5 hidden"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>

                <div class="flex items-center gap-2 group/volume">
                    <button onclick="toggleMute()" class="text-slate-300 hover:text-white transition-colors cursor-pointer">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24" class="w-5 h-5"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
                    </button>
                    <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="1" class="w-16 h-1 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-blue-500" oninput="changeVolume(this.value)" />
                </div>

                <div class="relative flex items-center ml-2">
                    <button id="liveButton" onclick="syncToLive()" class="flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-rose-500/10 border border-rose-500/30 hover:bg-rose-500/20 active:scale-95 transition-all text-[10px] font-bold uppercase text-rose-400 hidden select-none">
                        <span id="liveDot" class="w-1.5 h-1.5 bg-rose-500 rounded-full animate-pulse"></span>
                        <span id="liveText">Live</span>
                    </button>
                </div>
            </div>

            <div class="flex items-center gap-4 relative">
                
                <button onclick="toggleSettings()" class="text-slate-300 hover:text-white transition-colors cursor-pointer">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                    </svg>
                </button>

                <button onclick="togglePiP()" class="text-slate-300 hover:text-white transition-colors cursor-pointer">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                        <rect x="3" y="4" width="18" height="16" rx="2" ry="2" />
                        <rect x="12" y="11" width="7" height="5" rx="1" ry="1" fill="currentColor" />
                    </svg>
                </button>

                <button onclick="toggleFullscreen()" class="text-slate-300 hover:text-white transition-colors cursor-pointer">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3.75v4.5m0-4.5h4.5m-4.5 0L9 9M3.75 20.25v-4.5m0 4.5h4.5m-4.5 0L9 15M20.25 3.75v4.5m0-4.5h-4.5m4.5 0L15 9m5.25 11.25v-4.5m0 4.5h-4.5m4.5 0L15 15" />
                    </svg>
                </button>
            </div>
        </div>
        
        <div id="errorOverlay" class="absolute inset-0 bg-slate-950/90 flex items-center justify-center hidden z-50">
            <p id="errorMessage" class="text-xs bg-rose-500/10 text-rose-400 border border-rose-500/20 px-4 py-2 rounded-xl font-medium"></p>
        </div>
    </div>

    <script>
        // ============ DOM ELEMENTS ============
        const loadingState = document.getElementById('loadingState');
        const landingPage = document.getElementById('landingPage');
        const errorState = document.getElementById('errorState');
        const iframeContainer = document.getElementById('iframeContainer');
        const hlsContainer = document.getElementById('hlsContainer');
        const urlInput = document.getElementById('customUrlInput');

        // ============ MAIN APP INITIALIZATION ============
        function initializeApp() {
            const urlParams = new URLSearchParams(window.location.search);
            const streamUrl = urlParams.get('q');

            if (!streamUrl) {
                loadingState.classList.add('hidden');
                errorState.classList.add('hidden');
                iframeContainer.classList.add('hidden');
                hlsContainer.classList.add('hidden');
                landingPage.classList.remove('hidden');
                return;
            }

            landingPage.classList.add('hidden');
            errorState.classList.add('hidden');
            loadingState.classList.remove('hidden');

            setTimeout(() => {
                loadingState.classList.add('hidden');
                if (streamUrl.toLowerCase().includes('.m3u8')) {
                    renderHls(streamUrl);
                } else {
                    renderIframe(streamUrl);
                }
            }, 500);
        }

        function generateAndPlay() {
            const inputVal = urlInput.value.trim();
            if (!inputVal) {
                alert("Please enter a valid URL first.");
                return;
            }

            const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?q=' + encodeURIComponent(inputVal);
            window.history.pushState({ path: newUrl }, '', newUrl);
            initializeApp();
        }

        function resetToGenerator() {
            const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
            window.history.pushState({ path: cleanUrl }, '', cleanUrl);
            urlInput.value = '';
            initializeApp();
        }

        function showError(message) {
            loadingState.classList.add('hidden');
            landingPage.classList.add('hidden');
            iframeContainer.classList.add('hidden');
            hlsContainer.classList.add('hidden');
            
            errorState.classList.remove('hidden');
            errorState.classList.add('flex');
            document.getElementById('errorText').textContent = message;
        }

        // ============ IFRAME RENDERING ============
        function renderIframe(url) {
            try {
                iframeContainer.classList.remove('hidden');
                iframeContainer.innerHTML = `<iframe src="${url}" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
            } catch (error) {
                showError(`Failed to load iframe: ${error.message}`);
            }
        }

        // ============ HLS PLAYER LOGIC ============
        let hls = null;
        let isLiveStream = false;
        let driftTimer = null;
        let secondsBehind = 0;
        let notificationTimeout = null;

        const video = document.getElementById('videoElement');
        const liveNotification = document.getElementById('liveNotification');
        const liveButton = document.getElementById('liveButton');
        const liveText = document.getElementById('liveText');
        const errorOverlay = document.getElementById('errorOverlay');
        const errorMessage = document.getElementById('errorMessage');

        const centerPlayIcon = document.getElementById('centerPlayIcon');
        const centerPauseIcon = document.getElementById('centerPauseIcon');
        const bottomPlayIcon = document.getElementById('bottomPlayIcon');
        const bottomPauseIcon = document.getElementById('bottomPauseIcon');
        const centerPlayBtn = document.getElementById('centerPlayBtn');
        const settingsMenu = document.getElementById('settingsMenu');

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            return `-${m}:${s}`;
        }

        function startDriftTimer() {
            clearInterval(driftTimer);
            driftTimer = setInterval(() => { secondsBehind++; liveText.innerText = formatTime(secondsBehind); }, 1000);
            liveText.innerText = formatTime(secondsBehind);
        }

        function resetLiveUI() {
            clearInterval(driftTimer);
            secondsBehind = 0;
            liveText.innerText = 'Live';
        }

        function togglePlay(event) {
            if (event && (event.target.closest('#settingsMenu') || event.target.closest('button[onclick="toggleSettings()"]'))) {
                return;
            }

            if (video.paused) {
                video.play().catch(e => console.log(`Play blocked: ${e.message}`));
                updatePlayUI(true);
            } else {
                video.pause();
                updatePlayUI(false);
            }
        }

        function updatePlayUI(isPlaying) {
            if (isPlaying) {
                centerPlayIcon.classList.add('hidden'); centerPauseIcon.classList.remove('hidden');
                bottomPlayIcon.classList.add('hidden'); bottomPauseIcon.classList.remove('hidden');
                centerPlayBtn.classList.add('opacity-0', 'scale-75');
                clearTimeout(notificationTimeout);
                liveNotification.classList.remove('opacity-100', 'translate-y-0');
                liveNotification.classList.add('opacity-0', 'translate-y-2');
                clearInterval(driftTimer);
            } else {
                centerPlayIcon.classList.remove('hidden'); centerPauseIcon.classList.add('hidden');
                bottomPlayIcon.classList.remove('hidden'); bottomPauseIcon.classList.add('hidden');
                centerPlayBtn.classList.remove('opacity-0', 'scale-75');
                if (isLiveStream) {
                    liveNotification.classList.remove('opacity-0', 'translate-y-2');
                    liveNotification.classList.add('opacity-100', 'translate-y-0');
                    clearTimeout(notificationTimeout);
                    notificationTimeout = setTimeout(() => {
                        liveNotification.classList.remove('opacity-100', 'translate-y-0');
                        liveNotification.classList.add('opacity-0', 'translate-y-2');
                    }, 2000);
                    startDriftTimer();
                }
            }
        }

        video.addEventListener('play', () => updatePlayUI(true));
        video.addEventListener('pause', () => updatePlayUI(false));

        function syncToLive() {
            clearTimeout(notificationTimeout);
            liveNotification.classList.remove('opacity-100', 'translate-y-0');
            liveNotification.classList.add('opacity-0', 'translate-y-2');
            
            if (hls && hls.liveSyncPosition !== null) { video.currentTime = hls.liveSyncPosition; } 
            else if (video.seekable && video.seekable.length > 0) { video.currentTime = video.seekable.end(video.seekable.length - 1); }
            
            resetLiveUI();
            video.play().catch(e => console.log(e));
            updatePlayUI(true);
        }

        function changeVolume(val) { video.volume = val; video.muted = (val == 0); }
        function toggleMute() { video.muted = !video.muted; document.getElementById('volumeSlider').value = video.muted ? 0 : video.volume; }

        // Settings Toggle Logic
        function toggleSettings() {
            settingsMenu.classList.toggle('show');
        }

        // Close settings when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('#settingsMenu') && !e.target.closest('button[onclick="toggleSettings()"]')) {
                settingsMenu.classList.remove('show');
            }
        });

        // Picture-in-Picture Logic
        async function togglePiP() {
            try {
                if (document.pictureInPictureElement) {
                    await document.exitPictureInPicture();
                } else if (document.pictureInPictureEnabled) {
                    await video.requestPictureInPicture();
                } else {
                    alert("Picture-in-Picture is not supported in this browser.");
                }
            } catch (err) {
                console.error("PiP Error:", err);
            }
        }
        
        // Fullscreen Logic with Mobile Auto-Rotate
        async function toggleFullscreen() {
            if (!document.fullscreenElement) {
                try {
                    await hlsContainer.requestFullscreen();
                    
                    if (screen.orientation && screen.orientation.lock) {
                        try {
                            await screen.orientation.lock("landscape");
                        } catch (err) {
                            console.warn("Screen auto-rotation not supported or blocked.", err);
                        }
                    }
                } catch (err) { console.error("Fullscreen error:", err); }
            } else {
                try {
                    await document.exitFullscreen();
                    if (screen.orientation && screen.orientation.unlock) {
                        screen.orientation.unlock();
                    }
                } catch (err) { console.error("Exit fullscreen error:", err); }
            }
        }

        function renderHls(m3u8Url) {
            try {
                hlsContainer.classList.remove('hidden');
                if (hls) hls.destroy();
                
                if (Hls.isSupported()) {
                    hls = new Hls({ liveSyncDurationCount: 3 });
                    hls.loadSource(m3u8Url);
                    hls.attachMedia(video);
                    
                    hls.on(Hls.Events.LEVEL_LOADED, (event, data) => {
                        isLiveStream = data.details.live;
                        if (isLiveStream) liveButton.classList.remove('hidden');
                    });

                    hls.on(Hls.Events.MANIFEST_PARSED, () => { 
                        video.play().catch(() => updatePlayUI(false)); 
                    });

                    hls.on(Hls.Events.ERROR, (event, data) => {
                        if (data.fatal) {
                            errorMessage.innerText = `Stream error: ${data.details}. The stream might be offline or the link is invalid.`;
                            errorOverlay.classList.remove('hidden');
                        }
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = m3u8Url;
                    video.addEventListener('loadedmetadata', () => {
                        if (video.duration === Infinity) { 
                            isLiveStream = true; 
                            liveButton.classList.remove('hidden'); 
                        }
                        video.play().catch(() => updatePlayUI(false));
                    });
                } else {
                    throw new Error('HLS streaming is not supported on this browser');
                }
            } catch (error) {
                showError(`Failed to load stream: ${error.message}`);
            }
        }

        window.addEventListener('popstate', initializeApp);

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializeApp);
        } else {
            initializeApp();
        }
    </script>
</body>
</html>
