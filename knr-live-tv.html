<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stream</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100vh;
      background: black;
      overflow: hidden;
      
      /* Pure layout code alignment */
      display: grid;
      place-content: center; /* Centers the alignment container */
      place-items: center;    /* Centers the iframe inside it both vertically & horizontally */
    }

    iframe {
      border: 0;
      aspect-ratio: 16 / 9;
      width: 100vw;
      max-width: 100%;
      max-height: 100vh;
    }
  </style>
</head>
<body>

  <iframe src="Link Here" allowfullscreen></iframe>

</body>
</html>
